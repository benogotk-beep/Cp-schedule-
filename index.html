
<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="web-title-tag">分店智能排班系統 V10.0-Ultimate</title>
    
    <!-- 🟢 iPad / iPhone 專屬 F12 控制台偵錯晶片 -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <!-- 🔮 水晶閣獨家 - iPad iOS Safari 萬能防崩潰安全阻斷器 (必須放在最頂部) -->
    <script>
        (function() {
            const originalGetElementById = document.getElementById;
            document.getElementById = function(id) {
                const el = originalGetElementById.call(document, id);
                if (!el) {
                    // 🟢 如果外部 app.js 尋找不存在的元素 (如 nav-analysis, tab-analysis 等)
                    // 為了防止拋出 null is not an object 錯誤導致整個排班表渲染中斷，
                    // 我們動態返回一個真實的虛擬節點，防範任何 style 或 classList 讀寫崩潰！
                    const dummy = document.createElement('div');
                    dummy.setAttribute('id', id);
                    dummy.style.display = 'none';
                    return dummy;
                }
                return el;
            };
        })();
    </script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #f5f3ff;
            --primary-hover: #6d28d9;
            --success: #10b981;
            --success-light: #ecfdf5;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --danger: #ef4444;
            --danger-light: #fdf2f2;
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 60px;
        }

        /* 🔒 iPad 蘋果風格專屬全屏防飄移安全登入遮罩 */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            background: #0f172a; 
            background: rgba(15, 23, 42, 0.85);
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-box-pack: center;
            -webkit-justify-content: center;
            justify-content: center;
            z-index: 999999;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
            -webkit-transform: translateY(0);
            transform: translateY(0);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo { font-size: 50px; margin-bottom: 15px; display: inline-block; }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            margin-bottom: 20px;
            font-size: 16px; 
            outline: none;
            text-align: center;
            background: #f8fafc;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), #9333ea);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
        }

        .auth-banner {
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
        }

        .tab-bar {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            background: #ffffff;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: #f1f5f9;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
        }

        .tab-content { padding: 20px; max-width: 1200px; margin: 0 auto; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .date-panel { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }

        select, input[type="text"], input[type="number"] {
            font-size: 16px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: white;
            outline: none;
            color: var(--text-main);
        }

        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-save { background: var(--success); color: white; }
        .btn-add { background: var(--primary); color: white; }
        .btn-del { background: var(--danger); color: white; }
        .btn-reset { background: #e2e8f0; color: #475569; }

        .cloud-status { padding: 10px 15px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-bottom: 15px; text-align: center; }
        .status-online { background: var(--success-light); color: var(--success); border: 1px solid #a7f3d0; }
        .status-offline { background: var(--warning-light); color: var(--warning); border: 1px solid #fde68a; }

        .scroll-box {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; background: white; }
        th, td { padding: 12px 14px; border-bottom: 1px solid var(--border-color); white-space: nowrap; }
        th { background: #f8fafc; font-weight: bold; color: var(--text-muted); }
    </style>
</head>
<body>

    <!-- 🔒 安全門禁 (全面相容 iPad Safari 100% 居中防飄移) -->
    <div id="login-overlay">
        <div class="login-box">
            <div class="login-logo">🔮</div>
            <h2 style="margin: 0 0 16px 0; font-size: 18px; color: #111827;">分店智能排班系統 V10.0</h2>
            <input type="password" id="global-pass-input" class="login-input" placeholder="請輸入安全口令" maxlength="12" onkeydown="if(event.key==='Enter') triggerGateLogin()">
            <button class="login-btn" onclick="triggerGateLogin()">安全登入驗證</button>
            <div id="login-fail-hint" style="color:var(--danger); font-size:12px; font-weight:bold; margin-top:12px; display:none;">❌ 口令錯誤，請重新輸入！</div>
        </div>
    </div>

    <!-- 頂部資訊列 -->
    <div class="auth-banner">
        <div id="role-display-text">🔑 目前權限：未登入</div>
        <div id="quick-notify-dot" style="background:var(--warning); color:white; padding:2px 8px; border-radius:10px; font-size:11px; display:none;">● 有待審批申請</div>
        <button class="btn" style="padding:4px 10px; background:#4b5563; color:white; font-size:12px;" onclick="triggerGlobalLogout()">安全登出</button>
    </div>

    <!-- 標籤導航 (完整復原所有 Tab 滿足 app.js 依賴) -->
    <div class="tab-bar" id="main-system-tab-bar" style="display: none;">
        <button class="tab-btn active" id="nav-schedule" onclick="switchTab('tab-schedule')">📅 每日排班</button>
        <button class="tab-btn" id="nav-bookings" onclick="switchTab('tab-bookings')">🔮 預約對接中心 <span id="booking-badge-dot" style="background:var(--danger); color:white; border-radius:50%; width:8px; height:8px; display:none; margin-left:4px;"></span></button>
        <button class="tab-btn" id="nav-my-month" onclick="switchTab('tab-my-month')">👤 個人當月排班</button>
        <button class="tab-btn" id="nav-analysis" onclick="switchTab('tab-analysis')">📈 數據分析</button>
    </div>

    <!-- 頁面1：每日排班 -->
    <div id="tab-schedule" class="tab-content" style="display: none;">
        <div id="cloud-indicator" class="cloud-status status-offline">⏳ 正在初始化排班引擎晶片...</div>
        <div class="card">
            <div class="title">分店智能排班沙盒 <span style="color:var(--warning);">[V10.0-Ultimate]</span></div>
            <div class="date-panel">
                <select id="schedule-year-select" onchange="handleDateContextChange()"></select>
                <select id="schedule-month-select" onchange="handleDateContextChange()"></select>
                <select id="schedule-day-select"></select>
                <button class="btn btn-reset" onclick="resetCurrentDayToAuto()">🔄 還原自動排班</button>
            </div>
            <div id="today-leave-names-box" style="text-align:center; font-size:12px; color:#dc2626; background:#fdf2f2; padding:8px; border-radius:10px; font-weight:bold;">今日放假：無</div>
        </div>
    </div>

    <!-- 🔮 頁面1.5：預約對接中心 (高精度數據拉平解析) -->
    <div id="tab-bookings" class="tab-content" style="display: none;">
        <div class="card">
            <div class="title">🔮 實時雲端預約審核中樞</div>
            <p style="font-size:12px; color:var(--text-muted); margin-bottom:15px;">系統已將多項目（美甲、美睫、紋繡）的預約數據與 Firebase 完美對齊。核准後，將自動登記至大表與個人備忘錄中！</p>
            <div id="live-bookings-container" class="scroll-box" style="background:#f8fafc; padding:15px; border-radius:14px; border:1px solid #cbd5e1; min-height:100px;">
                <div style="text-align:center; padding:30px; color:#94a3b8; font-weight:bold;">⏳ 正在加載嵌套預約數據流...</div>
            </div>
        </div>
    </div>

    <!-- 頁面3：數據分析 (補齊容器防止 app.js 報錯) -->
    <div id="tab-analysis" class="tab-content" style="display: none;">
        <div class="card">
            <div class="title">📈 營業大數據分析</div>
            <p style="font-size:13px; color:var(--text-muted);">歷史營業統計與老師排程飽和度分析，正在與 AI Agent 深度對接中...</p>
        </div>
    </div>

    <script src="app.js?v=10.0.5"></script>

    <!-- 🔮 預約對接中心自訂內建高精度解析器 (相容 iPad iOS 拋錯隔離保護網) -->
    <script>
        let liveBookings = {};

        function timeToMins(tStr) {
            if (!tStr) return 0;
            let p = tStr.split(':');
            return (parseInt(p[0]) * 60) + (parseInt(p[1]) || 0);
        }

        // 監聽並加載當月預約
        function startLiveBookingListener() {
            if (typeof firebase === 'undefined' || !firebase.apps.length) return;
            const db = firebase.database();
            const year = state.currentYear || 2026;
            const month = state.currentMonth || 5;
            const monthKey = `${year}-${month < 10 ? '0'+month : month}`;

            // 監聽嵌套路徑：v8_bookings/YYYY-MM
            db.ref(`v8_bookings/${monthKey}`).on('value', (snapshot) => {
                liveBookings = snapshot.val() || {};
                renderLiveBookings(liveBookings, monthKey);
            });
        }

        // 🌟 核心高難度：動態拉平並重組嵌套預約數據
        function renderLiveBookings(bookings, monthKey) {
            const container = document.getElementById('live-bookings-container');
            const badgeDot = document.getElementById('booking-badge-dot');
            if (!container) return;
            container.innerHTML = '';

            let flattenedBookings = [];

            // 深度遍歷：StaffName -> day_DD -> BookingId
            Object.keys(bookings).forEach(staffName => {
                const staffB = bookings[staffName] || {};
                Object.keys(staffB).forEach(dayKey => {
                    const dayNum = dayKey.replace("day_", "");
                    const slots = staffB[dayKey] || {};
                    Object.keys(slots).forEach(slotId => {
                        const b = slots[slotId];
                        if (b) {
                            flattenedBookings.push({
                                id: slotId,
                                staffName: staffName,
                                dayKey: dayKey,
                                date: dayNum,
                                customerName: b.customer || "顧客",
                                customerPhone: b.phone || "",
                                phoneLast4: b.phoneLast4 || "",
                                time: b.start || "12:00",
                                endTime: b.end || "13:30",
                                serviceType: b.item || "常規項目",
                                mainCategory: b.serviceType || "美甲",
                                status: b.status || "⏳ 待審",
                                remarks: b.remarks || "",
                                duration: b.duration || 90,
                                timestamp: b.timestamp || 0
                            });
                        }
                    });
                });
            });

            // 統計待審批數量
            const pendingBookings = flattenedBookings.filter(b => b.status.includes('待審') || b.status.includes('pending'));
            if (badgeDot) {
                badgeDot.style.display = pendingBookings.length > 0 ? 'inline-block' : 'none';
            }

            if (flattenedBookings.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:30px; color:#94a3b8; font-weight:bold;">🙌 目前尚無任何預約紀錄。</div>`;
                return;
            }

            // 按日期(升序) 與 時間(升序) 排序
            flattenedBookings.sort((a, b) => {
                if (parseInt(a.date) !== parseInt(b.date)) {
                    return parseInt(a.date) - parseInt(b.date);
                }
                return timeToMins(a.time) - timeToMins(b.time);
            });

            let html = `<table style="width:100%;">
                <thead>
                    <tr style="background:#f1f5f9;">
                        <th>預約日期</th>
                        <th>顧客姓名</th>
                        <th>電話 (WhatsApp)</th>
                        <th>指定人員</th>
                        <th>時段</th>
                        <th>預期耗時</th>
                        <th>預約細分項目</th>
                        <th>大類</th>
                        <th>備註</th>
                        <th>狀態</th>
                        <th style="text-align:center;">操作</th>
                    </tr>
                </thead>
                <tbody>`;

            flattenedBookings.forEach(b => {
                let statusColor = "orange";
                let actionButtons = '';

                if (b.status.includes('吉時') || b.status.includes('待審') || b.status.includes('特殊')) {
                    actionButtons = `
                        <button class="btn" style="background:var(--success); color:white; padding:6px 12px; font-size:12px; margin-right:6px;" onclick="approveBooking('${monthKey}', '${b.staffName}', '${b.dayKey}', '${b.id}')">批准</button>
                        <button class="btn" style="background:var(--danger); color:white; padding:6px 12px; font-size:12px;" onclick="rejectBooking('${monthKey}', '${b.staffName}', '${b.dayKey}', '${b.id}')">拒絕</button>
                    `;
                } else if (b.status.includes('批准') || b.status.includes('approved')) {
                    statusColor = "green";
                    actionButtons = `<span style="color:#64748b; font-size:12px;">已核准並排入</span>`;
                } else {
                    statusColor = "red";
                    actionButtons = `<span style="color:#94a3b8; font-size:12px;">已駁回拒絕</span>`;
                }

                html += `<tr>
                    <td><b>${b.date} 號</b></td>
                    <td><b>${b.customerName}</b></td>
                    <td><a href="https://wa.me/${b.customerPhone}" target="_blank" style="color:var(--primary); font-weight:bold;">💬 ${b.customerPhone}</a></td>
                    <td><span style="background:var(--primary-light); color:var(--primary); padding:2px 6px; border-radius:6px; font-weight:bold;">${b.staffName}</span></td>
                    <td style="color:#1e3a8a; font-weight:bold;">${b.time} - ${b.endTime}</td>
                    <td><b>${b.duration} mins</b></td>
                    <td style="font-size:12px;">${b.serviceType}</td>
                    <td><span style="background:#fef3c7; color:#d97706; padding:2px 6px; border-radius:6px; font-size:11px; font-weight:bold;">${b.mainCategory}</span></td>
                    <td style="font-size:11px; max-width:150px; overflow:hidden; text-overflow:ellipsis;">${b.remarks}</td>
                    <td style="color:${statusColor}; font-weight:bold;">${b.status}</td>
                    <td style="text-align:center;">${actionButtons}</td>
                </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // 批准預約 (同步寫入特殊排班備忘錄)
        function approveBooking(monthKey, staffName, dayKey, bookingId) {
            const db = firebase.database();
            const b = liveBookings[staffName]?.[dayKey]?.[bookingId];
            if (!b) return;

            db.ref(`v8_bookings/${monthKey}/${staffName}/${dayKey}/${bookingId}/status`).set('🟢 已批准');

            db.ref(`v8_special_notes/${monthKey}/${staffName}/${dayKey}`).set(`預約:${b.customer}(${b.item}, ${b.start})`).then(() => {
                showToast(`🎉 預約核准成功！已自動將預約同步至 ${staffName} 老師當日的日曆大表與備註！`);
            });
        }

        function rejectBooking(monthKey, staffName, dayKey, bookingId) {
            if (confirm("確定要拒絕這筆預約申請嗎？")) {
                firebase.database().ref(`v8_bookings/${monthKey}/${staffName}/${dayKey}/${bookingId}/status`).set('🔴 已拒絕');
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = "position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#0f172a; color:white; border:1px solid var(--success); padding:16px 24px; border-radius:16px; font-weight:bold; font-size:14px; box-shadow:0 20px 25px -5px rgba(0,0,0,0.3); z-index:9999999; text-align:center; max-width:90%;";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 4000);
        }

        // 🟢 iPad Safari 拋錯安全隔離保護網，確保即使 app.js 還沒讀完，iPad 也不會崩潰白屏
        const checkDbInterval = setInterval(() => {
            try {
                const cloudMode = typeof isCloudMode !== 'undefined' ? isCloudMode : false;
                const db = typeof database !== 'undefined' ? database : null;
                if (cloudMode && db) {
                    startLiveBookingListener();
                    clearInterval(checkDbInterval);
                }
            } catch (err) {
                console.error("Safely catching database polling initialization error:", err);
            }
        }, 1000);
    </script>
</body>
</html>
